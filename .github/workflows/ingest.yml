name: Monthly Data Ingest

on:
  schedule:
    # Run on the 1st of every month at 04:00 UTC
    - cron: "0 4 1 * *"
  workflow_dispatch:

jobs:
  ingest:
    name: Ingest CBI regulatory data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or deploy key if the default token can't push to protected branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run ingest
        run: npm run ingest
        env:
          # Override DB path if needed; defaults to data/cbi.db
          CBI_DB_PATH: ${{ vars.CBI_DB_PATH || 'data/cbi.db' }}

      - name: Check for DB changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No database changes detected — data is already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Database updated."
          fi

      - name: Commit updated database
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: monthly CBI data ingest $(date +%Y-%m-%d)"
          git push
